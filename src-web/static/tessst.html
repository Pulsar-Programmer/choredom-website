<!DOCTYPE html>
<html>
<head>
  <style>
    .dropdown {
      position: relative;
      display: inline-block;
      width: 200px;
    }

    .dropdown-options {
      display: none;
      position: absolute;
      background-color: #f6f6f6;
      min-width: 160px;
      overflow: auto;
      box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
      z-index: 1;
    }

    .dropdown-options div {
      color: black;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
    }

    .dropdown-options div:hover {
      background-color: #ddd;
    }
  </style>
</head>
<body>
  <div id="dropdown" class="dropdown">
    <input id="filterInput" type="text" placeholder="Filter towns...">
    <div id="dropdownOptions" class="dropdown-options">
    </div>
  </div>

  <script>
    fetch('us_cities.json')
        .then(response => response.json())
        .then(data => populateDropdown(data));

    function populateDropdown(data) {
        const dropdown = document.getElementById('dropdownOptions');
        data.forEach(town => {
            const option = document.createElement('div');
            option.setAttribute('value', town.ID);
            option.textContent = town.CITY;
            dropdown.appendChild(option);
        });
        dropdown.style.display = 'block';
    }

    const input = document.getElementById('filterInput');
    input.addEventListener('input', filterOptions);

    function filterOptions() {
        const filterValue = this.value.toLowerCase();
        const options = document.querySelectorAll('#dropdownOptions div');
        options.forEach(option => {
            const optionText = option.textContent.toLowerCase();
            if (optionText.includes(filterValue)) {
                option.style.display = "";
            } else {
                option.style.display = "none";
            }
        });
    }
  </script>
</body>
</html>
