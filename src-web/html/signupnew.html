<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Choredom</title>
  <link rel="stylesheet" href="./src-web/static/signupnew.css">
</head>
<body>
  <h1 class="main-title">Sign Up</h1>
  <div class="all-inputs">
    <form action="signup.js" method="post">
      <input type="email" class="email-input" placeholder="Email">
      <input type="password" class="password-input" placeholder="Password">
      <input type="password" class="confirmPW-input" placeholder="Confirm Password">
      <button class="continue">Continue</button>
    </form>
    <select name="Cities" class="choose-cities">
      <option value="choose-region">Choose Your Region</option>
      <option value="Los Angeles">Los Angeles</option>
      <option value="Chicago">Chicago</option>
      <option value="New York">New York</option>
      <option value="Seattle">Seattle</option>
    </select>
  </div>
</body>
</html>
