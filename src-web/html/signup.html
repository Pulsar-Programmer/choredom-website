<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Choredom</title>
  <link rel="stylesheet" href="./src-web/static/signup.css">
</head>
<body>
  <h1 class="main-title">Sign Up</h1>
  <!-- <div class="all-inputs"> -->
    <form action="/verify-email" method="POST">
      <input name="email" type="text" class="email-input" placeholder="Email">
      <input name="password" type="password" class="password-input" placeholder="Password">
      <input name="password2" type="password" class="confirmPW-input" placeholder="Confirm Password">
      <input type="submit" class="continue"> <!-- Continue -->
    </form>
    <select name="Cities" class="choose-cities">
      <option value="choose-region">Choose Your Region</option>
      <option value="Los Angeles">Los Angeles</option>
      <option value="Chicago">Chicago</option>
      <option value="New York">New York</option>
      <option value="Seattle">Seattle</option>
    </select>
  <!-- </div> -->
</body>
</html>
