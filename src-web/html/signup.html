<form id="signupForm" action="/verify-email" method="post">
    <input name="email" type="text" class="email-input" placeholder="Email" required>
    <input id="password" name="password" type="password" class="password-input" placeholder="Password" required>
    <input id="password2" name="password2" type="password" class="confirmPW-input" placeholder="Confirm Password" required>
    <input name="username" type="text" class="username-input" placeholder="Username" required>
    <input name="displayname" type="text" class="displayname-input" placeholder="Display Name" required>
    <div id="dropdown" class="dropdown">
        <input name="location" id="filterInput" type="text" placeholder="Filter towns..." required>
        <div id="dropdownOptions" class="dropdown-options">
        </div>
    </div>
    <input type="submit" class="continue">
</form>
<script>
  window.addEventListener("load", function() {
    const form = document.getElementById("signupForm");

    form.addEventListener("submit", function(event) {
        //event.preventDefault();
        
        let password1Field = document.getElementById("password");
        let password2Field = document.getElementById("password2");
        if (password2Field.value !== password1Field.value){
          alert('Passwords do not match. Please try again.');
          event.preventDefault();
        }
        password2Field.disabled = true; // disables the password2 field

        // now submit the form as is
        form.submit();
    });
  });
</script>
