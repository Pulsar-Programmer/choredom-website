<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Choredom</title>
  <link rel="stylesheet" href="./src-web/static/signup.css">
  <script>
    function populateDropdown(data) {
        const dropdown = document.getElementById('dropdownOptions');
        data.forEach(town => {
            const option = document.createElement('div');
            option.setAttribute('value', town.ID);
            option.textContent = town.CITY;
            dropdown.appendChild(option);
        });
        dropdown.style.display = 'block';
    }

    function filterOptions() {
        const filterValue = this.value.toLowerCase();
        const options = document.querySelectorAll('#dropdownOptions div');
        options.forEach(option => {
            const optionText = option.textContent.toLowerCase();
            if (optionText.includes(filterValue)) {
                option.style.display = "";
            } else {
                option.style.display = "none";
            }
        });
    }
  </script>
</head>
<body>
  <h1 class="main-title">Sign Up</h1>
  <div id="dropdown" class="dropdown">
    <input id="filterInput" type="text" placeholder="Filter towns...">
    <div id="dropdownOptions" class="dropdown-options">
    </div>
  </div>
  <script>
    let selectedOption = null;

    function populateDropdown(data) {
        const dropdown = document.getElementById('dropdownOptions');
        data.forEach(town => {
            const option = document.createElement('div');
            option.setAttribute('value', town.ID);
            option.textContent = `${town.CITY}, ${town.STATE_NAME}`;
            dropdown.appendChild(option);
        });
        dropdown.style.display = 'block';
    }

    function filterOptions() {
        let count = 0;
        const filterValue = this.value.toLowerCase();
        const options = document.querySelectorAll('#dropdownOptions div');
        options.forEach(option => {
            const optionText = option.textContent.toLowerCase();
            if (optionText.includes(filterValue) && count < 10) {
                option.style.display = "";
                count++;
            } else {
                option.style.display = "none";
            }
        });
    }

    const dropdown = document.getElementById('dropdown');
    dropdown.addEventListener('click', function(e) {
        if (e.target.tagName === 'DIV' && e.target.parentNode.id === 'dropdownOptions') {
            selectedOption = e.target.textContent;
            document.getElementById('filterInput').value = selectedOption;
        }
    });

    fetch('us_cities.json')
        .then(response => response.json())
        .then(data => populateDropdown(data));

    const input = document.getElementById('filterInput');
    input.addEventListener('input', filterOptions);
  </script>
  <form action="/verify-email" method="POST">
    <input name="email" type="text" class="email-input" placeholder="Email">
    <input name="password" type="password" class="password-input" placeholder="Password">
    <input name="password2" type="password" class="confirmPW-input" placeholder="Confirm Password">
    <input name="username" type="text" class="username-input" placeholder="Username">
    <input name="displayname" type="text" class="displayname-input" placeholder="Display Name">
    <input type="submit" class="continue">
  </form>
  <script>
    const form = document.querySelector('form');
    form.addEventListener('submit', validateForm);

    function validateForm(e) {
      e.preventDefault();

      const email = document.querySelector('.email-input').value;
      const password = document.querySelector('.password-input').value;
      const password2 = document.querySelector('.confirmPW-input').value;
      const username = document.querySelector('.username-input').value;
      const displayname = document.querySelector('.displayname-input').value;

      if (!email || !password || !password2 || !username || !displayname) {
        alert('Please fill in all fields');
        return;
      }

      if (password !== password2) {
        alert('Passwords do not match');
        return;
      }

      const data = {
        email: email,
        password: password,
        username: username,
        displayname: displayname
      };

      sendData(data);
    }

    function sendData(data) {
      fetch('/verify-email', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(data)
      })
      .then(response => {
        //if (!response.ok) {
        //  throw new Error('Network response was not ok');
        //}
        //return response.json();
      })
      .then(data => {
        // handle the response data
      })
      .catch(error => {
        console.error('There has been a problem with your fetch operation: ', error);
      });
    }
  </script>
</body>
</html>
