<!DOCTYPE html>
<html>

<head>
  <title>Choredom: Settings</title>
  <script defer src="/src-web/static/password.js"></script>
  <link rel="stylesheet" href="/src-web/static/main.css">
  <link id="needs_style" rel="stylesheet" href="/src-web/static/main.css">
  <link id="needs_favicon" rel="icon" type="image/ico" href="/src-web/assets/favicon.ico">
  <script src="/src-web/static/theme.js"></script>
  <script src="/src-web/static/error.js"></script>
  <script src="/src-web/static/signout.js"></script>
</head>

<body>
  <header class="stdheader">
    <a href="/">
      <img src="/src-web/assets/logo.png" id="needs_logo" alt="Choredom Logo">
    </a>
    <nav>
      <a class="btna" href="/">Home</a>
      <a class="btna" href="/chat">Chat</a>
      <a class="btna" href="/tasks">Tasks in your Area</a>
      <a class="btna" href="/settings">Settings</a>
      <a class="btna" href="/post-job">Post</a>
      <a class="btna" href="/my-jobs">My Jobs</a>
      <a class="btna" href="/contacts">Contact Us</a>
      <button onclick="signout()" class="btnb">Sign Out</button>
    </nav>
  </header>

  <main>
    <div class="stdbox">
      <h2>Change Password</h2>
      <div class="label_region">
        <label class="stdlabel" for="currentPassword">Current Password:</label>
        <input type="password" id="currentPassword" name="p_old" required>
      </div>

      <div class="label_region">
        <label class="stdlabel" for="newPassword">New Password:</label>
        <input id="newPassword" name="p_new" type="password" pattern="^(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[!@#$%&])(?!.*\s).{8,}$" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters and at least one special character" required>
      </div>

      <div class="label_region">
        <label class="stdlabel" for="confirmPassword">Confirm New Password:</label>
        <input type="password" id="confirmPassword" name="p_new_2" required>
      </div>
  
      <button class="btnb embedb" onclick="submit_passcode()">Change Password</button>
    </div>
  </main>

  <footer class="stdfooter">
    <p>&copy; 2024 Choredom</p>
  </footer>
</body>

</html>
