<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>
    <script defer src="/src-web/static/password.js"></script>
</head>
<body>
    <h2>Change Password</h2>

    <form id="passwordForm" method="post" action="/settings/password/form">
        <label for="currentPassword">Current Password:</label><br>
        <input type="password" id="currentPassword" name="p_old" required><br>

        <label for="newPassword">New Password:</label><br>
        <input id="newPassword" name="p_new" type="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" required><br>

        <label for="confirmPassword">Confirm New Password:</label><br>
        <input type="password" id="confirmPassword" name="p_new_2" required><br>

        <input type="submit" value="Change Password">
    </form>
</body>
</html>
