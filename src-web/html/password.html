<head>
    <title>Change Password</title>
    <script defer src="/src-web/static/password.js"></script>
    <link rel="stylesheet" href="/src-web/static/main.css">
    <link rel="icon" type="image/ico" href="/src-web/assets/favicon.ico">
</head>
<body>
    <h2>Change Password</h2>

    <div class="stdc stdd">
        <label for="currentPassword">Current Password:</label><br>
        <input type="password" id="currentPassword" name="p_old" required><br>

        <label for="newPassword">New Password:</label><br>
        <input id="newPassword" name="p_new" type="password" pattern="^(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[!@#$%&])(?!.*\s).{8,}$" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters and at least one special character" required><br>

        <label for="confirmPassword">Confirm New Password:</label><br>
        <input type="password" id="confirmPassword" name="p_new_2" required><br>

        <button onclick="submit_passcode()">Change Password</button>
    </div>
    <script src="/src-web/static/error.js"></script>
    <script src="/src-web/static/signout.js"></script>
</body>
