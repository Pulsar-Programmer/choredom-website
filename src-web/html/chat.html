<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Choredom: Chats</title>
  <link rel="stylesheet" href="/src-web/static/main.css">
  <link id="needs_style" rel="stylesheet" href="/src-web/static/main.css">
  <link id="needs_favicon" rel="icon" type="image/ico" href="/src-web/assets/favicon.ico">
  <script src="/src-web/static/theme.js"></script>
  <script src="/src-web/static/error.js"></script>
  <script defer src="/src-web/static/chat-nav.js"></script>
  <script src="/src-web/static/signout.js"></script>
  <script defer src="/src-web/static/chat.js"></script>
</head>

<body>
  <header class="stdheader">
    <a href="/">
      <img src="/src-web/assets/logo.png" id="needs_logo" alt="Choredom Logo">
    </a>
    <nav>
      <a class="btna" href="/">Home</a>
      <a class="btna" href="/chat">Chat</a>
      <a class="btna" href="/tasks">Tasks in your Area</a>
      <a class="btna" href="/settings">Settings</a>
      <a class="btna" href="/post-job">Post</a>
      <a class="btna" href="/my-jobs">My Jobs</a>
      <a class="btna" href="/contacts">Contact Us</a>
      <button onclick="signout()" class="btnb">Sign Out</button>
    </nav>
  </header>

  <main>
    <div class="hanger">
      <h1>Welcome to Chats!</h1>
      <strong>Please don't respond to people you don't know.</strong>
      <strong>Responding to a user's chats allows them to rate you.</strong>
    </div>

    <div id="chatList" class="chat_list">
      <p class="stdtitle">Current Chats:</p>
      <!-- Chat boxes will be added here by JavaScript -->
    </div>
    
    <div id="chat_box">
      <div class="message">
        <div class="pfp"> 
          <a href="/users/${chat.sender}">${chat.sender}</a>
          <img src="${pfpurl}">
        </div>
        <p>${chat.timestamp}</p>
        <p>${expandImages(chat.msg)}</p>
      </div>


    </div>
  
    <div id="message-input-div" class="stdbox chat_enter">
      <div class="label_region">
        <label class="stdlabel">Enter a Message:</label>
        <input type="text" id="message-input" placeholder="Type a message">
        <button class="btnb embedb" onclick="send_chat()">Send</button>
      </div>

      <div class="label_region">
        <label class="stdlabel" for="chatsPics">Attach an Image:</label>
        <input type="file" accept=".jpg, .jpeg, .png" multiple id="file_upload_chats">
        <button class="btnb embedb" onclick="upload_chats()">Submit Chat Pictures</button>
      </div>
    </div>


  </main>

  <footer class="stdfooter">
    <p>&copy; 2024 Choredom</p>
  </footer>
</body>

</html>
