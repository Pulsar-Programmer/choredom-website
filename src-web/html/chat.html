<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Choredom</title>
    <link rel="stylesheet" href="/src-web/static/chat.css">
  </head>
  <body>
    <header>
      <h1>Choredom</h1>
      <a href="#">
        <img src="assets/logo.png" alt="Choredom Logo">
      </a>
      <nav>
        <a href="/">Home</a>
        <a href="post-job">Post</a>
        <a href="tasks">Tasks in your Area</a>
        <a href="/">Users</a>
        <a href="/settings">Settings</a>
      </nav>
    </header>

    <div>
      <button id="connect">Connect</button>
      <span>Status:</span>
      <span id="status">disconnected</span>
    </div>

    <div id="log"></div>

    <form id="chatform">
      <input type="text" id="text" />
      <input type="submit" id="send" />
    </form>
    <footer>
      <p>&copy; 2023 Choredom</p>
      <img src="assets/background.jpg" alt="Background Image">
    </footer>
    <hr />

    <section>
      <h2>Commands</h2>
      <table style="border-spacing: 0.5em;">
        <tr>
          <td>
            <code>/list</code>
          </td>
          <td>
            list all available rooms
          </td>
        </tr>
        <tr>
          <td>
            <code>/join name</code>
          </td>
          <td>
            join room, if room does not exist, create new one
          </td>
        </tr>
        <tr>
          <td>
            <code>/name name</code>
          </td>
          <td>
            set session name
          </td>
        </tr>
        <tr>
          <td>
            <code>some message</code>
          </td>
          <td>
            just string, send message to all peers in same room
          </td>
        </tr>
      </table>
    </section>

    <script src="/src-web/static/chat.js"></script>
  </body>
</html>
