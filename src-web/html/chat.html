<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
</head>
<body>
    <div id="messages"></div>
    <form id="messageForm">
        <input type="text" id="sender" placeholder="Your name">
        <input type="text" id="receiver" placeholder="Receiver's name">
        <textarea id="content" placeholder="Your message"></textarea>
        <input type="text" id="metadata" placeholder="Metadata (optional)">
        <button type="submit">Send</button>
    </form>

    <script>
        $(document).ready(function() {
            var fetchMessages = function() {
                $.ajax({
                    url: 'http://127.0.0.1:8080/receive_message',
                    type: 'GET',
                    success: function(res) {
                        $('#messages').html('');
                        res.forEach(function(msg) {
                            $('#messages').append('<p><strong>' + msg.sender + ' to ' + msg.receiver + ':</strong> ' + msg.content + '</p>');
                        });
                    },
                    error: function() {
                        alert('Error fetching messages');
                    },
                });
            };

            $('#messageForm').on('submit', function(e) {
                e.preventDefault();
                var message = {
                    sender: $('#sender').val(),
                    receiver: $('#receiver').val(),
                    content: $('#content').val(),
                    metadata: $('#metadata').val()
                };

                $.ajax({
                    url: 'http://127.0.0.1:8080/send_message',
                    type: 'POST',
                    data: JSON.stringify(message),
                    contentType: 'application/json; charset=utf-8',
                    success: function(res) {
                        alert('Message sent successfully');
                        fetchMessages();
                    },
                    error: function() {
                        alert('Error sending message');
                    },
                });
            });

            fetchMessages();
        });
    </script>
</body>
</html>
