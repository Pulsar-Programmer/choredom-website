<!DOCTYPE html>
<html>
  
<head>
  <title>Choredom: User</title>
  <link id="needs_style" rel="stylesheet" href="/src-web/static/main.css">
  <link id="needs_favicon" rel="icon" type="image/ico" href="/src-web/assets/favicon.ico">
  <link rel="stylesheet" href="/src-web/static/main.css">
  <link rel="stylesheet" href="/src-web/static/profile.css">
  <script src="/src-web/static/theme.js"></script>
  <script src="/src-web/static/error.js"></script>
  <script defer src="/src-web/static/profile.js"></script>
  <script src="/src-web/static/signout.js"></script>
</head>

<body>
  <header class="stdheader">
    <a href="/">
      <img src="/src-web/assets/logo.png" id="needs_logo" alt="Choredom Logo">
    </a>
    <nav>
      <a class="btna" href="/">Home</a>
      <a class="btna" href="/chat">Chat</a>
      <a class="btna" href="/tasks">Tasks in your Area</a>
      <a class="btna" href="/settings">Settings</a>
      <a class="btna" href="/post-job">Post</a>
      <a class="btna" href="/my-jobs">My Jobs</a>
      <a class="btna" href="/contacts">Contact Us</a>
      <button onclick="signout()" class="btnb">Sign Out</button>
    </nav>
  </header>

  <main>
    <div class="profile stdbox">
      <img src="" id="profile_pic" height="500" width="500">
      <h1 id="displayname">Name: {}</h1>
      <h2 id="username">Username: {}</h2>
      <h3 id="AvgRating">Rating: {}</h3>
      <h4 id="CreationDate">Joined: {}</h4>
      <h5 id="state">{}</h5>
      <p id="bio">{}</p>
      <div id="pics"></div>
    </div>

    <div class="profile stdbox">
      <div class="rating">
        
        <input id="star5" type="radio" name="rating" value="5">
        <label for="star5">&#9733;</label>

        <input id="star4" type="radio" name="rating" value="4">
        <label for="star4">&#9733;</label>

        <input id="star3" type="radio" name="rating" value="3">
        <label for="star3">&#9733;</label>

        <input id="star2" type="radio" name="rating" value="2">
        <label for="star2">&#9733;</label>

        <input id="star1" type="radio" name="rating" value="1">
        <label for="star1">&#9733;</label>

      </div>
  
      <textarea class="stdtextarea" id="body" placeholder="Enter your review here..."></textarea>
      <button class="btnb embedb" onclick="submitReviewForm()">Submit Rating</button>

      <button id="rpbutton" class="btnb embedb" onclick="report_user()">Report User</button>
      <button class="btnb embedb dangerzonebtn" onclick="delete_rating()">Delete Rating</button>
  
    </div>

    <div id="reviews" class="stdbox">

    </div>
  </main>
  
  <footer class="stdfooter">
    <p>&copy; 2024 Choredom</p>
    <a href="/policy">Our Privacy Policy</a>
  </footer>
  
</body>

</html>
