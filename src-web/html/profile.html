<head>
  <title>Profile Page</title>
  <link rel="stylesheet" href="/src-web/static/main.css">
</head>

<body>
  <div class="profile">
    <img src="" id="profile_pic" height="500" width="500">
    <h1 id="displayName">Name: {}</h1>
    <h2 id="username">Username: {}</h2>
    <h3 id="AvgRating">Rating: {}</h3>
    <h4 id="CreationDate">Joined: {}</h4>
    <h5 id="state">{}</h5>
    <p id="bio">{}</p>
    <div id="pics"></div>
  </div>
  <div class=ratings>
    <body>
  </div>
  <div class="profile">
    <div class="rating">
      <input id="star5" type="radio" name="rating" value="5">
      <label for="star5">5★</label>
      <input id="star4" type="radio" name="rating" value="4">
      <label for="star4">4★</label>
      <input id="star3" type="radio" name="rating" value="3">
      <label for="star3">3★</label>
      <input id="star2" type="radio" name="rating" value="2">
      <label for="star2">2★</label>
      <input id="star1" type="radio" name="rating" value="1">
      <label for="star1">1★</label>
    </div>

    <textarea id="body" placeholder="Enter your review here..."></textarea>
    <button onclick="submitReviewForm()">Submit rating</button>


    <button onclick="delete_rating()">Delete rating</button>
    <div class="reviews">
      <!-- Reviews will be added here -->
    </div>

  </div>
  <script src="/src-web/static/error.js"></script>
  <script defer src="/src-web/static/profile.js"></script>
  <link rel="stylesheet" href="/src-web/static/profile.css">
</body>
<div id="reviews"></div>
