<!DOCTYPE html>
<html>

<head>
  <title>Choredom: Settings</title>
  <link rel="stylesheet" href="/src-web/static/main.css">
  <link id="needs_style" rel="stylesheet" href="/src-web/static/main.css">
  <link id="needs_favicon" rel="icon" type="image/ico" href="/src-web/assets/favicon.ico">
  <script src="/src-web/static/theme.js"></script>
  <script src="/src-web/static/error.js"></script>
  <script defer src="/src-web/static/settings.js"></script>
  <script src="/src-web/static/signout.js"></script>
</head>

<body>
  <header class="stdheader">
    <a href="/">
      <img id="needs_logo" src="/src-web/assets/logo.png" alt="Choredom Logo">
    </a>
    <nav>
      <a class="btna" href="/">Home</a>
      <a class="btna" href="/chat">Chat</a>
      <a class="btna" href="/tasks">Tasks in your Area</a>
      <a class="btna" href="/settings">Settings</a>
      <a class="btna" href="/post-job">Post</a>
      <a class="btna" href="/my-jobs">My Jobs</a>
      <a class="btna" href="/contacts">Contact Us</a>
      <button onclick="signout()" class="btnb">Sign Out</button>
    </nav>
  </header>

  <main>
    <div class="stdbox">
      <div class="label_region">
        <label class="stdlabel" for="themeToggleBtn">Choose Your Theme:</label>
        <!-- <button id="themeToggleBtn" class="stdb">Toggle Theme</button> -->
        <img id="themeToggleBtn" src="/src-web/assets/favicon.ico" alt="Toggle Theme" onclick="set_theme('Light')"
          width="100px" height="100px">
        <img id="themeToggleBtn" src="/src-web/assets/darkfavicon.ico" alt="Toggle Theme" onclick="set_theme('Dark')"
          width="100px" height="100px">
        <img id="themeToggleBtn" src="/src-web/assets/aerofavicon.ico" alt="Toggle Theme" onclick="set_theme('Aero')"
          width="100px" height="100px">
        <!-- <img id="themeToggleBtn" src="/src-web/assets/contrastfavicon.ico" alt="Toggle Theme" onclick="set_theme('Contrast')" width="100px" height="100px"> -->
      </div>

      <div class="label_region">
        <label class="stdlabel" for="username">Username:</label>
        <input type="text" id="username" name="username" pattern="^[A-Za-z0-9]+$"
        title="Should only contain letters and numbers" required>
      </div>

      <div class="label_region">
        <label class="stdlabel" for="displayname">Display Name:</label>
        <input type="text" id="displayname" name="displayname" pattern="^[A-Za-z0-9 ]+$"
          title="Should only contain letters, spaces, and numbers" required>
      </div>
  
      <div class="label_region">
        <label class="stdlabel" for="city">Location:</label>
        <div id="dropdown" class="dropdown">
          <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/selectize.js/0.15.2/css/selectize.default.min.css">
          <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
          <script src="https://cdnjs.cloudflare.com/ajax/libs/selectize.js/0.15.2/js/selectize.min.js"></script>
          <script src="/src-web/static/us-cities.js"></script>
          <select required name="location" id="city" style="width: 300px;">
          </select>
        </div>
      </div>

      <div class="label_region">
        <label class="stdlabel" for="bio">Bio:</label>
        <textarea class="stdtextarea" id="bio" name="bio" title="Should only contain letters, spaces and numbers"></textarea>
        <!-- <input type="submit" value="Submit"> -->
        <button class="btnb embedb" onclick="settings_post()">Submit</button>
      </div>

      <div class="label_region">
        <label class="stdlabel">Current Profile Picture:</label>
        <img src="" id="pfp" width="500" height="500">
      </div>

      <div class="label_region">
        <label class="stdlabel">Upload a New Profile Picture</label>
        <input type="file" accept=".jpg, .jpeg, .png" id="file_upload_pfp">
        <button class="btnb embedb" onclick="upload_pfp()">Submit Profile Picture</button>
      </div>
  
      <div class="label_region">
        <label class="stdlabel">Bio Picture(s):</label>
        <input type="file" accept=".jpg, .jpeg, .png" multiple id="file_upload_bio">
        <button class="btnb embedb" onclick="upload_bio()">Submit Bio Picture</button>
      </div>
      
      <div class="label_region">
        <label class="stdlabel">View Your Profile:</label>
        <a class="btna embedb" id="gritty" href="/users/"> View Profile</a>
      </div>

      <div class="label_region">
        <label class="stdlabel">Get Verified:</label>
        <a class="btna embedb" href="/settings/upload">Upload a Gov ID</a>
      </div>

      <div class="label_region dangerzone">
        <label class="stdlabel">Change Login:</label>
        <a class="btna embedb" href="/settings/email">Change Email</a>
        <a class="btna embedb" href="/settings/password">Change Password</a>
      </div>

      <div class="label_region dangerzone">
        <label class="stdlabel">Delete Account:</label>
        <input type="password" id="password-confirmation" placeholder="Confirm with your password" name="password"
          pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
          title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters"
          required>
        <button class="btnb embedb" onclick="delete_form()">Delete Account</button>
      </div>
    </div>
  </main>
  
  <footer class="stdfooter">
    <p>&copy; 2024 Choredom</p>
    <a href="/policy">Our Privacy Policy</a>
  </footer>
</body>

</html>
