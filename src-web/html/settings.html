  <div>
    <label for="username">Username:</label><br>
    <input type="text" id="username" name="username"pattern="^[A-Za-z0-9]+$" title="Should only contain letters and numbers"required><br>

    <label for="displayname">Display Name:</label><br>
    <input type="text" id="displayname" name="displayname"pattern="^[A-Za-z0-9 ]+$"title="Should only contain letters, spaces, and numbers"required><br>

    <div id="dropdown">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/selectize.js/0.15.2/css/selectize.default.min.css">
      <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

      <label for="city">Filter Towns...</label>
      <select required name="location" id="city" style="width: 300px;">
      </select>
    </div>

    <label for="bio">Bio:</label><br>
    <textarea id="bio" name="bio" title="Should only contain letters, spaces and numbers"></textarea><br>
    <!-- <input type="submit" value="Submit"> -->
    <button onclick="settings_post()">Submit</button>

    <label>Current Profile Picture:</label>
    <img src="" id="pfp" width="500" height="500">

    <label>Upload a New Profile Picture</label>
    <input type="file" accept=".jpg, .jpeg, .png" id="file_upload_pfp"><br>
    <button onclick="upload_pfp()">Submit Profile Picture</button><br>

    <label>Bio Picture(s):</label>
    <input type="file" accept=".jpg, .jpeg, .png" multiple id="file_upload_bio"><br>
    <button onclick="upload_bio()">Submit Profile Picture</button>

    <label>Privacy </label>
  <a href="/settings/email">Change email</a>

    <label>View Your Profile!</label>

  <label>Get Verified:</label>
  <a href="/settings/upload">Upload a Gov ID</a><br>

      <label>Delete Account:</label>
      <input type="password" id="password-confirmation" placeholder="Confirm with your password" name="password"pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" required>
      <button onclick="delete_form()">Delete Account</button>
  </div>
