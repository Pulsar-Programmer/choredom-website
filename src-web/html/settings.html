<head>
  <link rel="stylesheet" type="text/css" href="/src-web/static/settings.css">
</head>
  <form action="/settings-post" method="POST">
    <label for="username">Username:</label><br>
    <input type="text" id="username" name="username"pattern="[A-Za-z0-9]+" title="Should only contain letters and numbers"required><br>

    <label for="displayname">Display Name:</label><br>
    <input type="text" id="displayname" name="displayname"pattern="[A-Za-z0-9 ]+"title="Should only contain letters, spaces, and numbers"required><br>

    <div id="dropdown">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/selectize.js/0.15.2/css/selectize.default.min.css">
      <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/selectize.js/0.15.2/js/selectize.min.js"></script>
      <script src="/src-web/static/us-cities.js"></script>
      <label for="city">Filter Towns...</label>
      <select required name="location" id="city" style="width: 300px;">
      </select>
    </div>

    <label for="bio">Bio:</label><br>
    <textarea id="bio" name="bio"pattern="[A-Za-z0-9 ]+" title="Should only contain letters, spaces and numbers"></textarea><br>
    <input type="submit" value="Submit">
  </form>

  <form action="/settings/pics-pfp" method="POST">
    <label for="pfp">Profile Picture:</label><br>
    <input type="file" id="pfp" name="pfp" accept=".jpg, .jpeg, .png" ><br>
  </form>
  <form action="/settings/pics-bio" method="POST">
    <label for="bioPics">Bio picture(s):</label><br>
    <input type="file" id="bioPics" name="bio_pics" accept=".jpg, .jpeg, .png" multiple><br>
  </form>

  <a href="/settings/email">Change email</a>
  <a href="/settings/password">Change Password</a>

  <a id="gritty" href="/users/"> View Profile</a>
  <a href="/settings/upload">Upload a Gov ID</a>


  <form id="delete-account-form" action="/settings/delete" method="POST" >
      <input type="password" id="password-confirmation" placeholder="Confirm with your password" name="password"pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Must contain at least one number and one uppercase and lowercase letter, and at least 8 or more characters" required>
      <input type="submit" value="Delete Account">
  </form>


  <script src="error.html"></script>
  <script defer src="./src-web/static/settings.js"></script>
