<!DOCTYPE html>
<html>
<head>
  <title>Choredom: Chat</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* General styles */
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 0;
      padding: 0;
    }
    /* Chat container */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    /* Chat list */
    .chat-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }
    /* Chat box */
    .chat-box {
      border: 1px solid #ddd;
      padding: 20px;
      background-color: #ffffff;
      border-radius: 5px;
    }
    /* Chat box title */
    .chat-box h3 {
      margin: 0 0 1em;
    }
    /* Chat box last message */
    .chat-box p {
      margin: 0 0 1em;
      padding: 0.5em;
      border-radius: 10px;
      background: #e6e6e6;
    }
    /* Send money button */
    .send-money {
      padding: 10px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    /* Send money button on hover */
    .send-money:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <header>
    <h1>Choredom</h1>
    <a href="#">
      <img src="assets/logo.png" alt="Choredom Logo">
    </a>
    <nav>
      <a href="homepage.html">Home</a>
      <a href="post.html">Post</a>
      <a href="/task.html">Tasks in your Area</a>
      <a href="#">Users</a>
      <a href="#">Settings</a>
    </nav>
  </header>
  <main>
    <div class="container">
      <h2>Your Chats</h2>
      <div class="chat-list">
        <div class="chat-box" id="chat1">
          <h3 id="display-name1">Display Name 1</h3>
          <p>Last message...</p>
          <button class="send-money">Send Money</button>
        </div>
        <div class="chat-box" id="chat2">
          <h3 id="display-name2">Display Name 2</h3>
          <p>Last message...</p>
          <button class="send-money">Send Money</button>
        </div>
        <!-- Add more chat boxes as needed -->
      </div>
    </div>
  </main>
  <footer>
    <p>&copy; 2023 Choredom</p>
    <img src="assets/background.jpg" alt="Background Image">
  </footer>
</body>
</html>
