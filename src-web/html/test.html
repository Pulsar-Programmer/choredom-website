<!DOCTYPE html>
<html>
<head>
  <title>Select Town</title>
  <style>
    /* Styles omitted for brevity */
  </style>
</head>
<body>

<div class="dropdown">
  <input type="text" placeholder="Select town..." id="dropdownInput">
  <div id="dropdownContent" class="dropdown-content"></div>
</div>

<script>
  // Fetch the JSON data and populate the dropdown
  fetch('us_cities.json')
    .then(response => response.json())
    .then(data => {
      const dropdownContent = document.getElementById('dropdownContent');
      dropdownContent.style.display = 'none'; // Hide the dropdown content by default
      data.forEach(town => {
        const div = document.createElement('div');
        div.textContent = `${town.CITY}, ${town.STATE_NAME}`;
        div.addEventListener('click', function() {
          // Display and save the selected town when clicked
          const dropdownInput = document.getElementById('dropdownInput');
          dropdownInput.value = this.textContent;
          localStorage.setItem('selectedTown', this.textContent);
          // Hide the dropdown menu after a selection is made
          dropdownContent.style.display = 'none';
        });
        dropdownContent.appendChild(div);
      });
    });

  // Add an input event listener to the dropdown input to filter the options
  const dropdownInput = document.getElementById('dropdownInput');
  dropdownInput.addEventListener('input', function() {
    const filter = this.value.toUpperCase();
    const divs = Array.from(document.getElementById('dropdownContent').children);
    divs.forEach(div => div.style.display = 'none'); // Hide all options initially

    if (filter.length < 1) {
      dropdownContent.style.display = 'none'; // Hide the dropdown content when the input field has less than 1 character
      return;
    }

    // Filter the options and limit the results to the top 10 options
    const relevantOptions = divs
      .filter(div => div.textContent.toUpperCase().includes(filter))
      .slice(0, 10);

    relevantOptions.forEach(div => div.style.display = ''); // Show the relevant options

    if (relevantOptions.length > 0) {
      dropdownContent.style.display = 'block';
    }
  });

  // Load the selected town when the page loads
  window.onload = function() {
    const selectedTown = localStorage.getItem('selectedTown');
    if (selectedTown) {
      dropdownInput.value = selectedTown;
    }
  };
</script>

</body>
</html>
