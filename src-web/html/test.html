<!DOCTYPE html>
<html>
<head>
  <title>Select Town</title>
  <style>
    /* Style the dropdown container */
    .dropdown {
      position: relative;
      display: inline-block;
    }

    /* Style the dropdown button */
    .dropdown button {
      background-color: #4CAF50;
      color: white;
      padding: 16px;
      font-size: 16px;
      border: none;
      cursor: pointer;
    }

    /* Style the dropdown content (hidden by default) */
    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #f1f1f1;
      min-width: 230px;
      overflow: auto;
      box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
      z-index: 1;
    }

    /* Style the dropdown content items */
    .dropdown-content div {
      color: black;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
    }

    /* Show the dropdown content when the input field is focused */
    .dropdown input:focus + .dropdown-content {
      display: block;
    }
  </style>
</head>
<body>

<div class="dropdown">
  <input type="text" placeholder="Select town..." id="dropdownInput">
  <div id="dropdownContent" class="dropdown-content"></div>
</div>

<script>
  // Fetch the JSON data and populate the dropdown
  fetch('us_cities.json')
    .then(response => response.json())
    .then(data => {
      const dropdownContent = document.getElementById('dropdownContent');
      data.forEach(town => {
        const div = document.createElement('div');
        div.textContent = `${town.CITY}, ${town.STATE_NAME}`;
        dropdownContent.appendChild(div);
      });
    });

  // Add an input event listener to the dropdown input to filter the options
  const dropdownInput = document.getElementById('dropdownInput');
  dropdownInput.addEventListener('input', function() {
    const filter = this.value.toUpperCase();
    const divs = document.getElementById('dropdownContent').getElementsByTagName('div');
    for (let i = 0; i < divs.length; i++) {
      const txtValue = divs[i].textContent || divs[i].innerText;
      if (txtValue.toUpperCase().indexOf(filter) > -1) {
        divs[i].style.display = "";
      } else {
        divs[i].style.display = "none";
      }
    }
  });
</script>
</body>
</html>
