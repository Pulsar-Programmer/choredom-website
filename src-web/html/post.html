      <img src="/src-web/assets/logo.png" id="needs_logo" alt="Choredom Logo">

      <a class="stda" href="/">Home</a>
      <a class="stda" href="/chat" id="chat-button">Chat</a>

      <a class="stda" href="/settings">Settings</a>
      <a class="stda" href="/post-job" id="post-button">Post</a>
      <a class="stda" href="/my-jobs" id="my-jobs">My Jobs</a>
      <a class="stda" href="/contacts">Contact Us</a>
      <button id="signout-button"class="signoutb">Sign Out</button>
    </nav>
  </header>
<head>
  <title>Choredom: Post a Job</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/src-web/static/main.css">
  <link id="needs_style" rel="stylesheet" href="/src-web/static/main.css">
  <link id="needs_favicon" rel="icon" type="image/ico" href="/src-web/assets/favicon.ico">
  <script src="/src-web/static/theme.js"></script>
</head>
<body>
  <!-- style="background-color: white;" -->
  <main>
    <div class="stdc">
      <h2>Post a Job</h2>
      <div id="jobForm">
        <input id="title" name="title" type="text" placeholder="Title of your job" pattern="^[a-zA-Z0-9 ]*$" required>
        <input id="body" name="body" type="text" placeholder="Body of your job description" pattern="^[a-zA-Z0-9 ]*$"required>
        <div id="dropdown" class="dropdown">
          <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/selectize.js/0.15.2/css/selectize.default.min.css">
          <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
          <script src="https://cdnjs.cloudflare.com/ajax/libs/selectize.js/0.15.2/js/selectize.min.js"></script>
          <script src="/src-web/static/us-cities.js"></script>
          <label for="city">Filter Towns...</label>
          <select required name="location" id="city" style="width: 300px;">
          </select>
        </div>
        <input id="time" name="time" type="date" placeholder="Date of your job"required>
        <input id="price" name="price" type="number" placeholder="Price you are willing to pay"required>
        <button onclick="submit_post()">Submit Job Post</button>
      </div>
    </div>
  </main>
  <script defer src="/src-web/static/post.js"></script>
  <script src="/src-web/static/error.js"></script>
  <script src="/src-web/static/signout.js"></script>
</body>
