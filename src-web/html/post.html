<!DOCTYPE html>
<html>
<head>
  <title>Choredom: Post a Job</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./src-web/static/post.css">
</head>
<body style="background-color: white;">
  <header>
    <h1>Choredom</h1>
    <a href="#">
      <img src="assets/logo.png" alt="Choredom Logo">
    </a>
    <nav>
      <a href="#">Home</a>
      <a href="chat" id="chat-button">Chat</a>
      <a href="tasks">Tasks in your Area</a>
      <a href="settings">Settings</a>
      <a href="post-job" id="post-button">Post</a>
      <a href="#" id="signout-button">Sign Out</a>
    </nav>
  </header>
  <main>
    <div class="container">
      <h2>Post a Job</h2>
      <form id="jobForm" action="/post-job-2" method="post">
        <input id="title" name="title" type="text" placeholder="Title of your job" pattern="^[a-zA-Z0-9 ]*$" required>
        <input id="body" name="body" type="text" placeholder="Body of your job description" pattern="^[a-zA-Z0-9 ]*$"required>
        <div id="dropdown">
          <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
          <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/js/select2.min.js"></script>
          <link href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.0.13/css/select2.min.css" rel="stylesheet" />
          <script>
            $(function(){
              $('#city').select2();
            });
          </script>
          <script defer src="/src-web/static/us-cities.js"></script>
      
          <label for="city">Filter Towns...</label>
          <select name="location" id="city" style="width: 300px;">
          </select>
        </div>
        <input id="time" name="time" type="date" placeholder="Date of your job"required>
        <input id="price" name="price" type="number" placeholder="Price you are willing to pay"required>
        <input type="submit">
      </form>
    </div>
  </main>
  <footer>
    <p>&copy; 2023 Choredom</p>
    <img src="assets/background.jpg" alt="Background Image">
  </footer>
  <script defer src="./src-web/static/post.js"></script>
</body>
</html>
