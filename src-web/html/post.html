<!DOCTYPE html>
<html>

<head>
  <title>Choredom: Post Job</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/src-web/static/main.css">
  <link id="needs_style" rel="stylesheet" href="/src-web/static/main.css">
  <link id="needs_favicon" rel="icon" type="image/ico" href="/src-web/assets/favicon.ico">
  <script src="/src-web/static/theme.js"></script>
  <script defer src="/src-web/static/post.js"></script>
  <script src="/src-web/static/error.js"></script>
  <script src="/src-web/static/signout.js"></script>
</head>

<body>
  <header class="stdheader">
    <a href="/">
      <img src="/src-web/assets/logo.png" id="needs_logo" alt="Choredom Logo">
    </a>
    <nav>
      <a class="btna" href="/">Home</a>
      <a class="btna" href="/chat">Chat</a>
      <a class="btna" href="/tasks">Tasks in your Area</a>
      <a class="btna" href="/settings">Settings</a>
      <a class="btna" href="/post-job">Post</a>
      <a class="btna" href="/my-jobs">My Jobs</a>
      <a class="btna" href="/contacts">Contact Us</a>
      <button id="signout-button" class="btnb">Sign Out</button>
    </nav>
  </header>

  <main>
    <div class="stdc">
      <h2>Post a Job</h2>
      <div id="jobForm">
        <label>Title</label><br>
        <input id="title" name="title" type="text" placeholder="Title of your job" pattern="^[a-zA-Z0-9 ]*$" required>
        <label>Description of Job</label><br>
        <input id="body" name="body" type="text" placeholder="Body of your job description" pattern="^[a-zA-Z0-9 ]*$"
          required>
        <label>Location of Job</label><br>
        <div id="dropdown" class="dropdown">
          <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/selectize.js/0.15.2/css/selectize.default.min.css">
          <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
          <script src="https://cdnjs.cloudflare.com/ajax/libs/selectize.js/0.15.2/js/selectize.min.js"></script>
          <script src="/src-web/static/us-cities.js"></script>
          <select required name="location" id="city" style="width: 300px;">
          </select>
        </div>
        <label>Date of Job</label><br>
        <input id="time" name="time" type="date" placeholder="Date of your job" required><br>
        <label>Price of Job</label><br>
        <input id="price" name="price" type="number" placeholder="Price you can pay" required>
        <button class="stda" onclick="submit_post()">Submit Job Post</button>
      </div>
    </div>
  </main>

  <footer class="stdfooter">
    <p>&copy; 2024 Choredom</p>
  </footer>

</body>

</html>
