<!DOCTYPE html>
<html>
  <header>
    <a href="/">
      <img src="/src-web/assets/logo.png" alt="Choredom Logo">
    </a>
    <nav>
      <a href="/">Home</a>
      <a href="/chat" id="chat-button">Chat</a>
      <a href="/tasks">Tasks in your Area</a>
      <a href="/post-job" id="post-button">Post</a>
      <a href="/settings">Settings</a>
      <a href="/contacts">Contact Us</a>
      <button id="signout-button">Sign Out</button>
    </nav>
  </header>
<head>
  <title>Choredom: View Tasks</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/src-web/static/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="jobs_add" class="container">
    <button onclick="get_location_data()">Filter Towns</button>
    <div id="dropdown">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/selectize.js/0.15.2/css/selectize.default.min.css">
      <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
      <script src="https://cdnjs.cloudflare.com/ajax/libs/selectize.js/0.15.2/js/selectize.min.js"></script>
      <!-- <script async src="/src-web/static/us-cities.js"></script> -->
      <label for="city">Filter Towns...</label>
      <select name="location" id="city" style="width: 300px;">
      </select>
    </div>
  </div>
  <main>
    <div id="filters" class="container">
      <input type="text" id="titleBodyFilter" placeholder="Filter by title or body">
      <select id="statusFilter">
        <option value="">Select Verification Status</option>
        <option value="Verified">Verified</option>
        <option value="Non-verified">Non-verified</option>
      </select>
      <input type="date" id="timeFilter" placeholder="Filter by time">
      <input type="number" id="minPriceFilter" placeholder="Minimum price">
      <input type="number" id="maxPriceFilter" placeholder="Maximum price">
      <button onclick="filterJobs()">Apply Filters</button>
    </div>
    <div id="job-container">
      <!-- Jobs will be added here -->
    </div>
  </main>
  <script src="/src-web/static/error.js"></script>
  <script defer src="/src-web/static/task.js"></script>
  <script src="/src-web/static/signout.js"></script>
</body>
<footer>
  <p>&copy; 2024 Choredom</p>
</footer>
</html>
