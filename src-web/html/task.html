<!DOCTYPE html>
<html>
<head>
  <title>Choredom: View Tasks</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./src-web/static/task.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div id="dropdown" class="dropdown">
        <input id="filterInput" name="location" type="text" placeholder="Filter towns...">
        <div id="dropdownOptions" class="dropdown-options"></div>
    </div>
    <div id="jobs_add">
      <button onclick="get_location_data()">Filter Towns</button>
      <input id="filterInput" type="text" placeholder="Filter towns...">
    </div>
    <h1>Choredom</h1>
    <a href="#">
      <img src="assets/logo.png" alt="Choredom Logo">
    </a>
    <nav>
      <a href="/">Home</a>
      <!-- <a href="/chat">Chat</a> -->
      <a href="/post-job">Post</a>
      <a href="#">Tasks in your Area</a>
      <a href="/settings">Settings</a>
    </nav>
  </header>
  <main>
    <div id="job-container">
      <!-- Jobs will be added here -->
    </div>
  </main>
<script>
      // Include the JavaScript code here...
      fetch('us_cities.json')
      .then(response => response.json())
      .then(data => populateDropdown(data));

    function populateDropdown(data) {
      const dropdown = document.getElementById('dropdownOptions');
      dropdown.style.display = 'none'; // Hide the dropdown initially
      data.forEach(town => {
        const option = document.createElement('div');
        option.setAttribute('value', town.ID);
        option.textContent = `${town.CITY}, ${town.STATE_NAME}`; 
        option.addEventListener('click', selectOption); 
        dropdown.appendChild(option);
      });
    }

    function selectOption() {
      const input = document.getElementById('filterInput');
      input.value = this.textContent; 
      const dropdown = document.getElementById('dropdownOptions');
      dropdown.style.display = 'none'; 
      input.blur(); 
    }

    const input = document.getElementById('filterInput');
    input.addEventListener('input', filterOptions);

    function filterOptions() {
      const filterValue = this.value.toLowerCase();
      const dropdown = document.getElementById('dropdownOptions');
      const options = Array.from(dropdown.children);
      options.forEach(option => option.style.display = "none"); 

      if (!filterValue) { 
        return; // Do nothing when the input field isn't touched or is empty
      }

      const relevantOptions = options
        .filter(option => option.textContent.toLowerCase().includes(filterValue))
        .sort((option1, option2) => {
          return option1.textContent.toLowerCase().indexOf(filterValue) -
            option2.textContent.toLowerCase().indexOf(filterValue);
        })
        .slice(0, 10); 

      relevantOptions.forEach(option => option.style.display = ""); 

      if (relevantOptions.length > 0) {
        dropdown.style.display = 'block'; 
      }
    }
</script>
  <footer>
    <p>&copy; 2023 Choredom</p>
    <img src="assets/background.jpg" alt="Background Image">
  </footer>
  <script src="/src-web/static/task.js"></script>
</body>
</html>
