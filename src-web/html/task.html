<!DOCTYPE html>
<html>
<head>
  <title>Choredom: View Tasks</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="task.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div id="dropdown" class="dropdown">
      <input id="filterInput" type="text" placeholder="Filter towns...">
      <div id="dropdownOptions" class="dropdown-options">
      </div>
    </div>
    <h1>Choredom</h1>
    <a href="#">
      <img src="assets/logo.png" alt="Choredom Logo">
    </a>
    <nav>
      <a href="/homepage">Home</a>
      <a href="/chat">Chat</a>
      <a href="/post">Post</a>
      <a href="#">Tasks in your Area</a>
      <a href="#">Settings</a>
    </nav>
  </header>
  <main>
    <div id="post-container">
      <!-- Posts will be added here -->
    </div>
  </main>
  <footer>
    <p>&copy; 2023 Choredom</p>
    <img src="assets/background.jpg" alt="Background Image">
  </footer>
  <button id="toggle-button">Toggle Dark Mode</button>
  <script src="/src-web/static/lolll.js"></script>
  <script>
    // Example data for posts
    const posts = [
      {
        displayName: "John Doe",
        username: "@johndoe",
        title: "Task 1",
        body: "Lorem ipsum dolor sit amet, consectetur adipiscing elit.",
        location: "Town A",
        dateTime: "2023-07-28T10:00",
        price: 50,
      },
      // Add more posts here
    ]

    // Function to generate the HTML for each post
    function generatePostHTML(post) {
      return `
        <div class="post">
          <h3>${post.displayName} (${post.username})</h3>
          <h4>${post.title}</h4>
          <p>${post.body}</p>
          <p>Location: ${post.location}</p>
          <p>Date and Time: ${post.dateTime}</p>
          <p>Price: $${post.price}</p>
          <button onclick="startChat('${post.username}')">Chat</button>
          <button onclick="applyForJob('${post.username}')">Apply</button>
        </div>
      `;
    }

    // Get the post container element
    const postContainer = document.getElementById("post-container");

    // Generate the HTML for each post and append it to the container
    posts.forEach((post) => {
      const postHTML = generatePostHTML(post);
      postContainer.innerHTML += postHTML;
    });

    // Function to start a chat with the poster
    function startChat(username) {
      // Open a new chat or space with the poster's username
    }

    // Function to apply for a job
    function applyForJob(username) {
      const url = '/apply'; // URL of server-side script to process applications

      // Use Fetch API to send a POST request
      fetch(url, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ username }),
      })
      .then(response => response.json())
      .then(data => {
        console.log('Success:', data);
      })
      .catch((error) => {
        console.error('Error:', error);
      });
    }

    // Get the toggle button
    const toggleButton = document.getElementById('toggle-button');

    // Add an event listener for click events
    toggleButton.addEventListener('click', function() {
      // Toggle the 'dark' class on the body element
      document.body.classList.toggle('dark');
    });
  </script>
  <script>
    let allTowns = [];

    function populateDropdown(data) {
        allTowns = data;
    }

    function filterOptions() {
        const dropdown = document.getElementById('dropdownOptions');
        dropdown.innerHTML = '';

        let count = 0;
        const filterValue = this.value.toLowerCase();
        allTowns.forEach(town => {
            const optionText = `${town.CITY}, ${town.STATE_NAME}`.toLowerCase();
            if (optionText.includes(filterValue) && count < 10) {
                const option = document.createElement('div');
                option.setAttribute('value', town.ID);
                option.textContent = `${town.CITY}, ${town.STATE_NAME}`;
                dropdown.appendChild(option);
                count++;
            }
        });
        dropdown.style.display = (count > 0) ? 'block' : 'none';
    }

    let selectedOption = null;

    const dropdown = document.getElementById('dropdown');
    dropdown.addEventListener('click', function(e) {
        if (e.target.tagName === 'DIV' && e.target.parentNode.id === 'dropdownOptions') {
            selectedOption = e.target.textContent;
            document.getElementById('filterInput').value = selectedOption;
        }
    });

    fetch('us_cities.json')
        .then(response => response.json())
        .then(data => populateDropdown(data));

    const input = document.getElementById('filterInput');
    input.addEventListener('input', filterOptions);

    const form = document.querySelector('form');
    form.addEventListener('submit', validateForm);

    function validateForm(e) {
        e.preventDefault();

        const formData = new FormData(form);
        let dataString = '';

        for (const [key, value] of formData.entries()) {
            if (dataString !== '') {
                dataString += '&';
            }
            dataString += encodeURIComponent(key) + '=' + encodeURIComponent(value);
        }

        if (!formData.get('email') || !formData.get('password') || !formData.get('password2') || !formData.get('username') || !formData.get('displayname')) {
            alert('Please fill in all fields');
            return;
        }

        if (formData.get('password') !== formData.get('password2')) {
            alert('Passwords do not match');
            return;
        }

        sendData(dataString);
    }

    function sendData(data) {
        fetch('/verify-email', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: data
        })
        .then(response => {
            // handle the response
        })
        .catch(error => {
            console.error('There has been a problem with your fetch operation: ', error);
        });
    }
  </script>
</body>
</html>
