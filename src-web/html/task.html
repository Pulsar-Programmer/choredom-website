<!DOCTYPE html>
<html>
<head>
  <title>Choredom: View Tasks</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./src-web/static/task.css">
</head>
<body>
  <header>
    <h1>Choredom</h1>
    <a href="#">
      <img src="assets/logo.png" alt="Choredom Logo">
    </a>
    <nav>
      <a href="/">Home</a>
      <a href="/post-job">Post</a>
      <a href="#">Tasks in your Area</a>
      <a href="/settings">Settings</a>
    </nav>
    <form id="filters" onsubmit="event.preventDefault(); applyFilters();">
      <label>
        Title:
        <input id="titleInput" type="text" placeholder="Filter by title...">
      </label>
      <label>
        Body Text:
        <input id="bodyInput" type="text" placeholder="Filter by body text...">
      </label>
      <label>
        Poster:
        <input id="posterInput" type="text" placeholder="Filter by poster...">
      </label>
      <label>
        Location:
        <input id="locationInput" type="text" placeholder="Filter by location...">
      </label>
      <label>
        Price Range:
        <input id="minPriceInput" type="number" placeholder="Min price...">
        <input id="maxPriceInput" type="number" placeholder="Max price...">
      </label>
      <button type="submit">Apply Filters</button>
    </form>
  </header>
  <main>
    <div id="job-container">
      <!-- Jobs will be added here -->
    </div>
  </main>
  <footer>
    <p>&copy; 2023 Choredom</p>
    <img src="assets/background.jpg" alt="Background Image">
  </footer>
  <script src="/src-web/static/task.js"></script>
</body>
</html>
