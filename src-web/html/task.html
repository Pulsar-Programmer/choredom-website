<!DOCTYPE html>
<html>
<head>
  <title>Choredom: View Tasks</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./src-web/static/task.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div id="jobs_add">
      <button onclick="get_location_data()">Filter Towns</button>
      <input id="filterInput" type="text" placeholder="Filter towns...">
    </div> 
    <h1>Choredom</h1>
    <a href="#">
      <img src="assets/logo.png" alt="Choredom Logo">
    </a>
    <nav>
      <a href="/">Home</a>
      <!-- <a href="/chat">Chat</a> -->
      <a href="/post-job">Post</a>
      <a href="#">Tasks in your Area</a>
      <a href="/settings">Settings</a>
    </nav>
  </header>
  <main>
    <div id="filters">
      <input type="text" id="titleBodyFilter" placeholder="Filter by title or body">
      <select id="statusFilter">
        <option value="">Select verification status</option>
        <option value="Verified">Verified</option>
        <option value="Non-verified">Non-verified</option>
      </select>
      <input type="date" id="timeFilter" placeholder="Filter by time">
      <input type="number" id="minPriceFilter" placeholder="Minimum price">
      <input type="number" id="maxPriceFilter" placeholder="Maximum price">
      <button onclick="filterJobs()">Apply Filters</button>
    </div>
    <div id="job-container">
      <!-- Jobs will be added here -->
    </div>
  </main>
  <footer>
    <p>&copy; 2023 Choredom</p>
    <img src="assets/background.jpg" alt="Background Image">
  </footer>
  <script defer src="/src-web/static/task.js"></script>
</body>
</html>
