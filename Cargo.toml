[package]
name = "choredom-website"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
actix = "0.13.0"
actix-web = "4.3.1"
actix-files = "0.6.2"
actix-multipart = "0.6.0"
actix-rt = "2.8.0"
actix-telepathy = "0.5.3"
actix-cors = "0.6.4"
actix-session = "0.7.2"
actix-identity = "0.5.2"


serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0.104"
serde_yaml = "0.9.25"
sanitize-filename = "0.5.0"

lettre = "0.10"
lettre_email = "0.9.4"
# rustls = "0.21.5"

rand = "0.8.5"
chrono = "0.4.26"
futures = "0.3.28"
tokio = "1.31.0"
reqwest = "0.11.18"
anyhow = "1.0.72"
surrealdb = "1.0.0-beta.9+20230402"
actix-session-surrealdb = "0.1.3"
tracing = "0.1.37"
password-hash = "0.5.0"
argon2 = "0.5.1"
actix-web-actors = "4.2.0"
actix-ws = "0.2.5"
actix-broker = "0.4.3"
env_logger = "0.10.0"
log = "0.4.20"

